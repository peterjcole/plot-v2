<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Fonts directory: resolved at module load time via __dirname -->
  <dir>/var/task/fonts</dir>
  <!-- Writable cache dir — /tmp is the only writable path on Lambda/Vercel -->
  <cachedir>/tmp/fontconfig-cache</cachedir>
  <config>
    <rescan><int>0</int></rescan>
  </config>
</fontconfig>
